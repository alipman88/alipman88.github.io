<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<script src="//ajax.googleapis.com/ajax/libs/jquery/1.4.3/jquery.min.js"></script>
		<script src="script.js" type="text/javascript"></script>
		<title>Story Project</title>
		<style type="text/css">
			.hide {
				display: none;
				color: #999;
			}
		</style>
	</head>
	<body>

		<div id="fb-root"></div><!-- ¡Important for IE users! -->

		<h3>Tell your story:</h3>

		<a id="fb_login" href="#">
			Tell my story with Facebook!</a>

		<!-- This img is set to be displayed by the callback function -->
		<img id="profile_pic" src="" hidden="true"/>
		
		<form id="story_form">
			<p>Name: <input type="text" id="name_field"><span class="hide"> Bonus jQuery! Sweet!</span></p>
			<p>Email: <input type="text" id="email_field"><span class="hide"> Bonus jQuery! Excellent!</span></p>
			<p>Location: <input type="text" id="location_field"><span class="hide"> Bonus jQuery! Awesome!</span></p>
			<p>
				My Story:<br/>
				<textarea id="story_field" rows="5" cols="60"></textarea><span class="hide"> Bonus jQuery! Cool!</span>
			</p>
			<input type="submit" value="Tell my story!">
		</form>
	</body>
</html>

<script>

// Triggers the function to request a Facebook login, pull user data, and map it to $(#storyform)
$("#fb_login").click(function() {
	authAndLogin("#story_form", app_ID, mapping, function() {
		// Code to execute after the authorization is completed and the data plugged into the form:
		// Displays a profile pic
		$('#profile_pic').attr('src', image_url);
		$('#profile_pic').show();
		// Hides Facebook login button after successful login
		$('#fb_login').hide();
	});
});

// Because this app makes heavy use of asynchrony,
// these input parameters can be defined on the fly,
// but they'd better be defined before somebody clicks "Tell my story with Facebook!"
app_ID = "167074973460096";
mapping = {		// 
	"name"			: "#name_field",
	"email"			: "#email_field",
	"location"		: "#location_field",
//  "gender"		: "#gender_field",	etc. 
	"size_attr"		: "width=400"
};

// Bonus jQuery Action!
$("textarea,input").focus(function () {
	$(".hide").fadeOut(100);
	$(this).next("span").fadeIn(100);
});
</script>
