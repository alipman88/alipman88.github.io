    <title>Ball Zone</title>
    <link href="http://netdna.bootstrapcdn.com/twitter-bootstrap/2.2.2/css/bootstrap-combined.min.css" rel="stylesheet">
    <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1, maximum-scale=1">

    <link rel="stylesheet" href="css/base.css">

    <style>

        h1 {
            margin: 30px;
            text-align: center;
        }

        .drag {
            display: inline-block;
            background: #9fe1e7;
            border-radius: 25px;
            width: 100px;
            height: 100px;
        }

        .drag1  { z-index: 101; background:           aqua; }
        .drag2  { z-index: 102; background:     aquamarine; }
        .drag3  { z-index: 103; background:      burlywood; }
        .drag4  { z-index: 104; background:      cadetblue; }
        .drag5  { z-index: 105; background:     chartreuse; }
        .drag6  { z-index: 106; background: cornflowerblue; }
        .drag7  { z-index: 107; background:           aqua; }
        .drag8  { z-index: 108; background:     aquamarine; }
        .drag9  { z-index: 109; background:      burlywood; }
        .drag10 { z-index: 110; background:      cadetblue; }
        .drag11 { z-index: 111; background:     chartreuse; }
        .drag12 { z-index: 112; background: cornflowerblue; }

    </style>
<style type="text/css"></style></head>

<body style="zoom: 1;">

<div style="height: 150px; width: 100%; background-color: #ddd;">
    <h1 style="margin-top: 0;">Drag the balls<br/>into the ball zone!</h1>
</div>

<div class="container">
    <div class="sixteen columns">
        <div class="drag drag1"></div>
        <div class="drag drag2"></div>
        <div class="drag drag3"></div>
        <div class="drag drag4"></div>
        <div class="drag drag5"></div>
        <div class="drag drag6"></div>
        <div class="drag drag7"></div>
        <div class="drag drag8"></div>
        <div class="drag drag9"></div>
        <div class="drag drag10"></div>
        <div class="drag drag11"></div>
        <div class="drag drag12"></div>
    </div>
</div>


<!-- jQuery is just for the demo! Hammer.js works without jQuery :-) -->
<script src="./Hammer.js_files/jquery.min.js"></script>
<script src="./Hammer.js_files/modernizr.js"></script>
<script src="./Hammer.js_files/jquery.hammer.js"></script>

<script>

    function findAbsolute(element) {
        var left = element.offset().left
        var  top = element.offset().top
        element.data('left', left);
        element.data('top', top);
    }

    function makeAbsolute(element) {
        element.css({
            position: "fixed",
            left: element.data('left'),
            top: element.data('top')
        });
    }

    $('.drag').each(function() {
        findAbsolute( $(this) );
    });   

    $('.drag').each(function() {
        makeAbsolute( $(this) );
    });

    top_z_index = 199;

    $(".drag")
            .hammer({ drag_max_touches:0})
            .on("touch drag", function(ev) {
                var touches = ev.gesture.touches;
                ev.gesture.preventDefault();
                var target = $(touches[0].target);

                target.css({
                    zIndex: top_z_index,
                    left: touches[0].pageX-50,
                    top: touches[0].pageY-50
                });
            })
            .on("dragstart touch", function(ev) {
                var touches = ev.gesture.touches;
                ev.gesture.preventDefault();
                var target = $(touches[0].target);

                top_z_index = top_z_index + 1;
                target.css("box-shadow", "0px 0px 2px 1px #000");
            })
            .on("dragend release", function(ev) {
                var touches = ev.gesture.touches;
                ev.gesture.preventDefault();
                var target = $(touches[0].target);

                target.css("box-shadow", "none");

                if (touches[0].pageY-50 > 150) {
                    console.log('not ballzone');
                } else {
                    console.log('ballzone');
                }
            });


</script>


</body></html>
