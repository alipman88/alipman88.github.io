<!-- jQuery is just for the demo! Hammer.js works without jQuery :-) -->
<script src="./Hammer.js_files/jquery.min.js"></script>

<script src="./Hammer.js_files/jquery.hammer.js"></script>

<script>

    function findAbsolute(element) {
        var left = element.offset().left
        var  top = element.offset().top
        element.data('left', left);
        element.data('top', top);
    }

    function makeAbsolute(element) {
        element.css({
            position: "fixed",
            left: element.data('left'),
            top: element.data('top')
        });
    }

    $('.drag').each(function() {
        findAbsolute( $(this) );
    });   

    $('.drag').each(function() {
        makeAbsolute( $(this) );
    });

    top_z_index = 199;

    $(".drag")
            .hammer({ drag_max_touches:0})
            .on("touch drag", function(ev) {
                var touches = ev.gesture.touches;
                ev.gesture.preventDefault();
                var target = $(touches[0].target);

                target.css({
                    zIndex: top_z_index,
                    left: touches[0].pageX-50,
                    top: touches[0].pageY-50
                });
            })
            .on("dragstart touch", function(ev) {
                var touches = ev.gesture.touches;
                ev.gesture.preventDefault();
                var target = $(touches[0].target);

                top_z_index = top_z_index + 1;
                target.css("box-shadow", "0px 0px 2px 1px #aaa");
            })
            .on("dragend release", function(ev) {
                var touches = ev.gesture.touches;
                ev.gesture.preventDefault();
                var target = $(touches[0].target);

                target.css("box-shadow", "none");

                if (touches[0].pageY-50 > 150) {
                    console.log('not ballzone');
                } else {
                    console.log('ballzone');
                }
            });


</script>
