<!DOCTYPE html>

<html>
	<head>
		<meta charset="UTF-8">
		<script src="//ajax.googleapis.com/ajax/libs/jquery/2.0.2/jquery.min.js"></script>
		<title>Like DFA on Facebook</title>
	</head>

	<body style="font-family:'lucida grande',tahoma,verdana,arial,sans-serif">
		<div id="fb-root"></div>
		<script>(function(d, s, id) {
		  var js, fjs = d.getElementsByTagName(s)[0];
		  if (d.getElementById(id)) return;
		  js = d.createElement(s); js.id = id;
		  js.src = "//connect.facebook.net/en_US/all.js#xfbml=1&appId=39915705558";
		  fjs.parentNode.insertBefore(js, fjs);
		}(document, 'script', 'facebook-jssdk'));</script>
		<div style="padding:25px;margin-top:25px;border:solid 1px #ccc;">
			<p style="text-align:center;">
				Some blurb about why folks should like us on Facebook<br/>
			<span class="fb-like-box" data-href="https://www.facebook.com/DFAaction" data-width="292" data-show-faces="false" data-header="false" data-stream="false" data-show-border="false"></span></p>
			<p style="text-align:center;">
				Already a fan? Invite five of your friends,<br/>and tell them why Democracy for America deserves their support:<br/>
				<span style="margin-top:0.5em;" class="fb-send" data-href="http://alipman88.github.io/facebook"></span>
			</p>
		</div>
	</body>

</html>
