<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Danny Bick</title>
    <link href="css/reset.css" rel="stylesheet">
    <link href="css/layout.css" rel="stylesheet">
    <link href="css/typography.css" rel="stylesheet">
    <link href="css/modal.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="http://cdn.jsdelivr.net/jquery.slick/1.3.15/slick.css"/>
    <link href="css/carousel.css" rel="stylesheet">
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>DANNY BICK</h1>
      </div><!-- END HEADER -->
      <div class="main">
        <div class="carousel right">
          <div><a class="reveal" data-reveal="4" href="http://vimeo.com/77595948"><img src="img/dont_worry_about_me.jpg"/></a></div>
          <div><a class="reveal" data-reveal="5" href="https://www.youtube.com/watch?v=lX6JcybgDFo"><img src="//i.vimeocdn.com/video/449778792_1280x720.jpg"/></a></div>
        </div><!-- END RIGHT CAROUSEL -->
        <div class="carousel left">
          <div><a class="reveal" data-reveal="0" href="img/1.jpg"><img src="img/1.jpg"/></a></div>
          <div><a class="reveal" data-reveal="1" href="img/2.jpg"><img src="img/2.jpg"/></a></div>
          <div><a class="reveal" data-reveal="2" href="img/3.jpg"><img src="img/3.jpg"/></a></div>
          <div><a class="reveal" data-reveal="3" href="img/4.jpg"><img src="img/4.jpg"/></a></div>
        </div><!-- END LEFT CAROUSEL -->
        <div style="clear: both;"></div>
      </div><!-- END MAIN -->
      <div class="footer">
        <a href="mailto:contact@dannybick.com">contact@dannybick.com</a>
      </div><!-- END FOOTER -->
    </div><!-- END CONTAINER -->
    <!-- MODAL CONTENT -->
    <div class="overlay">
    </div>
    <div class="modal">
      <a class="close" href="#">&times;</a>
      <div class="carousel-modal" style="padding: 30px 0;">
        <div><img src="img/1.jpg"/></div>
        <div><img src="img/2.jpg"/></div>
        <div><img src="img/3.jpg"/></div>
        <div><img src="img/4.jpg"/></div>
        <div>
          <iframe id="video-1" class="vimeo" src="//player.vimeo.com/video/77595948?color=ffffff&api=1&player_id=video-1" frameborder="0" webkitallowfullscreen mozallowfullscreen allowfullscreen></iframe>
        </div>
        <div>
          <iframe id="video-2" class="youtube" src="//www.youtube.com/embed/lX6JcybgDFo?enablejsapi=1" frameborder="0" allowfullscreen></iframe>
        </div>
      </div>
    </div>
    <!-- END MODAL CONTENT -->
    <script src="//ajax.googleapis.com/ajax/libs/jquery/1.11.1/jquery.min.js"></script>
    <script src="//cdn.jsdelivr.net/jquery.slick/1.3.15/slick.min.js"></script>
    <script src="js/jquery.vimeo.api.min.js"></script>
    <script src="js/youtube.api.js"></script>
    <script>
      // INITIALIZE CAROUSELS
      $(document).ready(function(){
        $('.left, .right, .carousel-modal').slick({
          arrows: true,
          dots: true,
          onBeforeChange: function(){stopAllVideo();}
        });
      });

      // CLOSE MODAL
      $('.close, .overlay').on('click', function() {
        $('.modal').animate({'top': '100%'}, function() {$('.overlay').hide();});
        stopAllVideo();
        return false;
      });

      // STOP VIDEO PLAYBACK
      function stopAllVideo() {
        var v = $('.slick-active').children('.vimeo');
        if(v[0]){v.vimeo('pause');}
        var y = $('.slick-active').children('.youtube');
        if(y[0]){ players[$(y).attr('id')].pauseVideo(); }
      }

      // OPEN MODAL & START VIDEO PLAYBACK
      $('.reveal').on('click', function() {
        var reveal = $(this).data('reveal');
        $('.carousel-modal').slickGoTo(reveal, true);        
        var v = $('.slick-active').children('.vimeo');
        if(v[0]){v.vimeo('play');}
        var y = $('.slick-active').children('.youtube');
        if(y[0]){ players[$(y).attr('id')].playVideo(); }
        $('.overlay').show();
        $('.modal').animate({'top': '10%'});
        return false;
      });

      // INITIALIZE YOUTUBE PLAYERS
      players = {};
      function onYouTubeIframeAPIReady() {
        $('.youtube').each(function() {
          players[this.id] = new YT.Player(this.id);
        });
      }
    </script>
  </body>
</html>
